name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2.2.0

    - name: Install dependencies
      run: bun install

    - name: Typecheck
      run: bun run typecheck

    - name: Lint
      run: bun run lint

    - name: Build
      run: bun run build

    - name: Verify build output
      run: |
        test -f dist/index.js
        test -f dist/bridge.js
        test -f vscode-extension/walkthrough-bridge.vsix

    - name: Run tests
      run: bun test

  node-compat:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
    - uses: actions/checkout@v6

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2.2.0

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: bun install

    - name: Build
      run: tsc -p tsconfig.build.json

    - name: Verify server starts on Node.js ${{ matrix.node-version }}
      run: |
        node dist/index.js &
        SERVER_PID=$!
        sleep 3
        kill $SERVER_PID 2>/dev/null || true
        echo "Server started and stopped successfully on Node.js ${{ matrix.node-version }}"
